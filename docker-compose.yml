# Oracle Knowledge Navigator — Docker Compose stack.
# Built incrementally per MASTER_PLAN.md.
# Phase 1 (step 2): Qdrant vector store only. Later phases add the MCP servers,
# orchestrator, Streamlit UI (the only public service), and the on-demand
# ingestion/eval tools. Everything here stays on the internal network until then.

services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    restart: unless-stopped
    # Persistent storage via bind mount. Relative path resolves under the project
    # root in both the dev container and on the VPS (/docker/oracle-knowledge-navigator).
    volumes:
      - ./data/qdrant:/qdrant/storage
    # Documents the listening ports without publishing them to the host.
    # 6333 = HTTP/REST, 6334 = gRPC. Reachable only on the internal network.
    expose:
      - "6333"
      - "6334"
    networks:
      - navigator-internal
    # No `ports:` mapping on purpose — Qdrant is internal only. Other containers
    # reach it as `qdrant:6333`. See README/PROGRESS for VPS verification steps.

  # ERP MCP server — Oracle Fusion Cloud ERP knowledge. Internal only.
  erp-mcp:
    build:
      context: .
      dockerfile: mcp_servers/erp/Dockerfile
    restart: unless-stopped
    env_file: .env            # VOYAGE_API_KEY for embedding + rerank
    environment:
      QDRANT_HOST: qdrant
    volumes:
      - ./data/sqlite:/app/data/sqlite:ro   # BM25 store, read-only
    networks:
      - navigator-internal
    depends_on:
      - qdrant

  # OCI MCP server — Oracle Cloud Infrastructure knowledge. Internal only.
  oci-mcp:
    build:
      context: .
      dockerfile: mcp_servers/oci/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
    volumes:
      - ./data/sqlite:/app/data/sqlite:ro
    networks:
      - navigator-internal
    depends_on:
      - qdrant

  # EPM MCP server — Oracle Fusion Cloud EPM knowledge. Internal only.
  epm-mcp:
    build:
      context: .
      dockerfile: mcp_servers/epm/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
    volumes:
      - ./data/sqlite:/app/data/sqlite:ro
    networks:
      - navigator-internal
    depends_on:
      - qdrant

  # Orchestrator — FastAPI + Claude agent loop, MCP client to the 3 servers. Internal only.
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    restart: unless-stopped
    env_file: .env            # ANTHROPIC_API_KEY
    environment:
      ERP_MCP_URL: http://erp-mcp:8001/mcp
      OCI_MCP_URL: http://oci-mcp:8002/mcp
      EPM_MCP_URL: http://epm-mcp:8003/mcp
    networks:
      - navigator-internal
    depends_on:
      erp-mcp:
        condition: service_healthy
      oci-mcp:
        condition: service_healthy
      epm-mcp:
        condition: service_healthy

  # Streamlit UI — the ONLY publicly exposed service, via existing Traefik.
  # Multi-homed: navigator-internal (to reach the orchestrator) + traefik_proxy (for routing).
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
    networks:
      - navigator-internal
      - traefik_proxy
    depends_on:
      orchestrator:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.navigator.rule=Host(`${PUBLIC_HOSTNAME}`)"
      - "traefik.http.routers.navigator.entrypoints=websecure"
      - "traefik.http.routers.navigator.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.navigator.middlewares=navigator-auth"
      - "traefik.http.middlewares.navigator-auth.basicauth.users=${BASIC_AUTH_USER}:${BASIC_AUTH_PASSWORD_HASH}"
      - "traefik.http.services.navigator.loadbalancer.server.port=8501"

  # On-demand ingestion tool. Not started by `docker compose up` (profiles).
  # Run with: docker compose run --rm ingestion
  ingestion:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file: .env          # provides VOYAGE_API_KEY
    environment:
      QDRANT_HOST: qdrant   # reach the vector store by service name
    volumes:
      - ./data/sqlite:/app/data/sqlite   # persist chunks.db, shared with MCP servers
    networks:
      - navigator-internal
    depends_on:
      - qdrant

  # On-demand eval runner. Run with: docker compose run --rm evals
  evals:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: evals/Dockerfile
    env_file: .env            # ANTHROPIC_API_KEY (queries+judge) + VOYAGE_API_KEY (retrieval scorecard)
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      QDRANT_HOST: qdrant     # retrieval_eval calls shared.retrieval directly
    volumes:
      - ./evals/results:/app/evals/results       # summaries land on the host
      - ./data/sqlite:/app/data/sqlite:ro        # BM25 store for retrieval_eval
    networks:
      - navigator-internal
    depends_on:
      orchestrator:
        condition: service_healthy

networks:
  # Created by this compose file. Explicit `name:` so it is exactly
  # "navigator-internal" regardless of the compose project directory name,
  # which keeps service-discovery and verification commands predictable.
  navigator-internal:
    name: navigator-internal
    driver: bridge
  # Existing external network that Traefik is attached to. Declared external so
  # compose does not create a duplicate; the UI joins it for public routing.
  traefik_proxy:
    external: true
